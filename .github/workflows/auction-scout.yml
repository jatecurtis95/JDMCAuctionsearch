# ============================================================================
# .github/workflows/auction-scout.yml
# ----------------------------------------------------------------------------
# Daily scheduled launcher for the jdmc-auction-scout Managed Agent.
# Brief ref: JDMC_Auction_Agent_Handover_Brief.md section 9.
#
# Required repo secrets (Settings > Secrets and variables > Actions):
#   ANTHROPIC_API_KEY   Anthropic Console API key
#   JDMC_AGENT_ID       id returned by scripts/create-agent.sh
#   JDMC_ENV_ID         id returned by scripts/create-environment.sh
#
# The launcher itself just creates a session and exits within seconds.
# The agent's actual run happens inside Anthropic's managed container
# and has its own 20 to 40 minute working window per brief section 11.
# ============================================================================
name: auction-scout

# Quoted to avoid YAML 1.1 boolean coercion of the bare word 'on' in
# strict linters. GitHub Actions accepts either form.
"on":
  schedule:
    # Once daily, 09:00 AWST (Perth) == 01:00 UTC.
    # AWST has no DST, so this is drift free year round.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      # All optional. When any are provided, the launcher switches the
      # agent into "targeted search" mode on top of the normal scan.
      # Leave all blank for a standard daily-style run on demand.
      make:
        description: "Make (e.g. Toyota, Nissan, Subaru)"
        required: false
        type: string
      model:
        description: "Model (e.g. Silvia, Crown Athlete)"
        required: false
        type: string
      year_min:
        description: "Minimum year"
        required: false
        type: string
      year_max:
        description: "Maximum year"
        required: false
        type: string
      km_max:
        description: "Maximum mileage in km"
        required: false
        type: string
      jpy_max:
        description: "Maximum expected winning bid in JPY"
        required: false
        type: string
      note:
        description: "Freeform extra instructions for the agent"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: auction-scout
  cancel-in-progress: false

jobs:
  run:
    name: launch session
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: install deps
        run: npm ci

      - name: launch agent session
        run: npx tsx src/launch-session.ts
        env:
          # Anthropic plumbing
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          JDMC_AGENT_ID:             ${{ secrets.JDMC_AGENT_ID }}
          JDMC_ENV_ID:               ${{ secrets.JDMC_ENV_ID }}
          AUCTION_SOURCE:            USS
          # MCP authorization tokens
          SUPABASE_PAT:              ${{ secrets.SUPABASE_PAT }}
          NOTION_INTEGRATION_SECRET: ${{ secrets.NOTION_INTEGRATION_SECRET }}
          M365_TENANT_ID:            ${{ secrets.M365_TENANT_ID }}
          M365_CLIENT_ID:            ${{ secrets.M365_CLIENT_ID }}
          M365_CLIENT_SECRET:        ${{ secrets.M365_CLIENT_SECRET }}
          # Dynamic targets (optional, launcher has safe defaults)
          NOTION_DATABASE_ID:             ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_AUCTION_SCOUT_DS_ID:     ${{ secrets.NOTION_AUCTION_SCOUT_DS_ID }}
          NOTION_WATCHLIST_DS_ID:         ${{ secrets.NOTION_WATCHLIST_DS_ID }}
          SUPABASE_PROJECT_ID:            ${{ secrets.SUPABASE_PROJECT_ID }}
          ALERT_EMAIL:                    ${{ secrets.ALERT_EMAIL }}
          ALERT_FROM_MAILBOX:             ${{ secrets.ALERT_FROM_MAILBOX }}
          # Ad-hoc search inputs from workflow_dispatch (all optional)
          INPUT_MAKE:     ${{ inputs.make }}
          INPUT_MODEL:    ${{ inputs.model }}
          INPUT_YEAR_MIN: ${{ inputs.year_min }}
          INPUT_YEAR_MAX: ${{ inputs.year_max }}
          INPUT_KM_MAX:   ${{ inputs.km_max }}
          INPUT_JPY_MAX:  ${{ inputs.jpy_max }}
          INPUT_NOTE:     ${{ inputs.note }}
